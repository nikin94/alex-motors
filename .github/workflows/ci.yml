# Lint, unit tests, typecheck+build, then the Playwright smoke suite.
# Deploys stay with Cloudflare Workers Builds — this workflow only gates PRs.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn test
      - run: yarn build
      - run: yarn playwright install --with-deps chromium
      - run: yarn test:e2e
